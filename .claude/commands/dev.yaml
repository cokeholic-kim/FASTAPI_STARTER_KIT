name: dev
description: 개발 환경 한 번에 시작 (PostgreSQL, Redis, Celery + FastAPI 서버)
script: |
  echo "🚀 개발 환경을 시작합니다..."

  # 1. Docker 서비스 시작 (PostgreSQL, Redis, Celery)
  echo "📦 Docker 서비스 시작 중..."
  docker-compose up -d postgres redis celery

  # 2. 서비스 준비 대기
  echo "⏳ 서비스 준비 중... (2초 대기)"
  sleep 2

  # 3. FastAPI 서버 시작 (핫 리로드)
  echo "✅ FastAPI 서버 시작"
  echo "📍 http://localhost:8000"
  echo "📋 Swagger UI: http://localhost:8000/docs"
  echo ""

  uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
